seo:
  title: "Notenn, projet Nuxt pour partitions ABC"
  description: "Étude de cas Notenn : organisation, édition, rendu et partage de partitions en notation ABC avec Nuxt et Vue."
headline: "Projet"
title: "Notenn"
description: "Un outil pour organiser, modifier, générer et partager des partitions écrites en notation ABC."
role: "Conception et développement d’une application pensée pour un usage musical précis : travailler avec des partitions texte sans perdre le confort d’une interface web."
stack:
  - "Nuxt"
  - "Vue"
  - "ABC notation"
  - "Produit SaaS"
outcomes:
  - "Un parcours centré sur un format musical très spécifique."
  - "Une interface pour classer, retrouver et manipuler des partitions rapidement."
  - "Une base extensible pour l’édition, le rendu et le partage."
body:
  - title: "Un usage précis"
    description: "Notenn part d’un besoin assez simple à formuler, mais pas si simple à rendre agréable : gérer des partitions en texte brut tout en gardant une lecture musicale claire."
  - title: "Interface de travail"
    description: "Le projet demande des écrans sobres, des actions rapides et une organisation qui aide à retrouver ses morceaux sans transformer l’outil en usine à options."
  - title: "Terrain produit"
    description: "C’est aussi un bon terrain pour tester des choix d’édition, de rendu et de partage sur un produit de niche, où les détails comptent vite."

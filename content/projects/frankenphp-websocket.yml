seo:
  title: "FrankenPHP WebSocket, module temps réel PHP"
  description: "Étude de cas FrankenPHP WebSocket : module expérimental compatible Pusher pour broadcasting temps réel en PHP."
headline: "Projet expérimental"
title: "FrankenPHP WebSocket"
description: "Un module WebSocket expérimental compatible avec Pusher pour tester du broadcasting temps réel en PHP."
role: "Exploration technique autour des connexions persistantes en PHP, avec l’idée de rester proche des usages Laravel existants."
stack:
  - "PHP"
  - "FrankenPHP"
  - "WebSocket"
  - "Laravel broadcasting"
outcomes:
  - "Une expérimentation sur les contraintes du temps réel."
  - "Une compatibilité pensée avec les conventions Laravel."
  - "Un travail bas niveau utile pour mieux comprendre les limites de la stack."
body:
  - title: "Sortir du CRUD"
    description: "Le temps réel force à penser autrement : connexions persistantes, messages, protocole, mémoire, erreurs et comportement quand plusieurs clients restent connectés."
  - title: "Rester compatible"
    description: "L’objectif Pusher-compatible rend l’expérience plus concrète, parce qu’elle peut parler à des applications Laravel qui utilisent déjà le broadcasting."
  - title: "Infrastructure"
    description: "Ce type de projet aide à mieux juger les sujets de déploiement, workers, ressources, supervision et choix d’outils quand une application dépasse le modèle requête/réponse classique."

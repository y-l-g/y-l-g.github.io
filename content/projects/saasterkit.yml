seo:
  title: "Saasterkit, starter kit SaaS Laravel et Vue"
  description: "Étude de cas Saasterkit : starter kit open source Laravel, Vue et Inertia avec auth, équipes, billing et administration."
headline: "Projet open source"
title: "Saasterkit"
description: "Un starter kit SaaS open source avec Laravel, Vue et Inertia, incluant authentification, équipes, facturation et administration."
role: "Conception d’un socle SaaS réutilisable pour éviter de reconstruire les mêmes bases à chaque nouveau produit, tout en gardant les choix techniques visibles."
stack:
  - "Laravel"
  - "Vue"
  - "Inertia"
  - "SaaS"
  - "Open source"
outcomes:
  - "Une base SaaS réutilisable."
  - "Des fonctionnalités communes prêtes à adapter."
  - "Un exemple concret d’architecture Laravel, Vue et Inertia."
body:
  - title: "Démarrer plus vite"
    description: "Un starter kit est utile s’il enlève les tâches répétitives sans enfermer le produit. L’objectif est de gagner du temps sur l’auth, les équipes et la facturation, pas d’imposer une grosse machine."
  - title: "Fonctions transverses"
    description: "Les comptes, rôles, abonnements et écrans d’administration se touchent beaucoup. Les penser ensemble évite de bricoler chaque sujet séparément."
  - title: "Code reprenable"
    description: "Le projet sert aussi à montrer une façon de structurer un SaaS Laravel/Vue que d’autres développeurs peuvent lire, adapter et continuer."
links:

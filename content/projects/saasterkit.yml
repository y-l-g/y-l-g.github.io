seo:
  title: "Saasterkit, starter kit SaaS Laravel et Vue"
  description: "Étude de cas Saasterkit : starter kit open source Laravel, Vue et Inertia avec auth, équipes, billing et administration."
headline: "Projet open source"
title: "Saasterkit"
description: "Un starter kit SaaS open source avec Laravel, Vue et Inertia, incluant authentification, équipes, facturation et administration."
role: "Conception d’un socle SaaS réutilisable qui regroupe les fonctionnalités communes sans masquer les décisions techniques importantes."
stack:
  - "Laravel"
  - "Vue"
  - "Inertia"
  - "SaaS"
  - "Open source"
outcomes:
  - "Base SaaS réutilisable."
  - "Fonctionnalités structurantes prêtes à adapter."
  - "Démonstration d’architecture Laravel/Vue maintenable."
body:
  - title: "Accélérer sans figer"
    description: "Un starter kit doit aider à démarrer vite tout en laissant l’équipe adapter les choix produit et techniques."
  - title: "Fonctionnalités transverses"
    description: "Auth, équipes, billing et administration créent beaucoup de complexité si elles ne sont pas pensées ensemble."
  - title: "Code lisible"
    description: "Le projet montre l’attention portée à la structure, aux conventions et à la reprise par d’autres développeurs."

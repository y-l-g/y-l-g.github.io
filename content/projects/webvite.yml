outcomes:
  - "Produit utilisé par de vrais clients."
  - "Abonnements et parcours de souscription."
  - "Contraintes opérationnelles réelles : maintenance, erreurs, support et évolution."
body:
  - title: "SaaS exploitable"
    description: "Webvite montre une approche orientée produit : il ne suffit pas de livrer des écrans, il faut gérer les parcours, les paiements et les cas limites."
  - title: "Back-end métier"
    description: "Le projet demande de relier comptes, sites, abonnements et administration dans une architecture qui reste compréhensible."
  - title: "Expérience terrain"
    description: "Travailler sur un service payant impose de prioriser la fiabilité, la clarté et les évolutions qui comptent vraiment."

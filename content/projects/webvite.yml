seo:
  title: "Webvite, SaaS en production pour petites entreprises"
  description: "Étude de cas Webvite : SaaS avec abonnements, sites clients, administration et utilisateurs payants."
headline: "Projet"
title: "Webvite"
description: "Un SaaS en production pour petites entreprises, avec abonnements, sites vitrines et de vrais utilisateurs payants."
role: "Développement produit sur un SaaS concret : parcours clients, gestion d’abonnement, création de sites et exploitation d’un service en production."
stack:
  - "Laravel"
  - "Vue"
  - "SaaS"

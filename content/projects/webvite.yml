seo:
  title: "Webvite, SaaS en production pour petites entreprises"
  description: "Étude de cas Webvite : SaaS avec abonnements, sites clients, administration et utilisateurs payants."
headline: "Projet"
title: "Webvite"
description: "Un SaaS en production pour petites entreprises, avec abonnements, sites clients et utilisateurs payants."
role: "Développement produit sur un service réel : parcours clients, gestion d’abonnement, création de sites, administration et maintenance en production."
stack:
  - "Laravel"
  - "Vue"
  - "SaaS"
  - "Paiement"
  - "Production"
outcomes:
  - "Un produit utilisé par de vrais clients."
  - "Des abonnements et un parcours de souscription."
  - "Des contraintes de production : support, erreurs, maintenance et évolutions régulières."
body:
  - title: "Un SaaS qui tourne"
    description: "Webvite n’est pas seulement une suite d’écrans. Il faut gérer les comptes, les paiements, les sites créés par les clients, les erreurs et les petits cas limites qui apparaissent quand le produit est utilisé."
  - title: "Back-end métier"
    description: "Le projet relie abonnements, utilisateurs, sites, administration et logique produit dans une base qui doit rester compréhensible quand de nouvelles demandes arrivent."
  - title: "Priorités concrètes"
    description: "Un service payant oblige à choisir ce qui compte vraiment : fiabilité, clarté des parcours, corrections rapides et évolutions qui améliorent l’usage."

seo:
  title: "Freelance Laravel developer in France"
  description: "Freelance Laravel development for SaaS products, APIs, business back ends, module rewrites, performance and existing applications."
headline: "Laravel"
title: "Freelance Laravel developer"
description: "I design and improve robust Laravel back ends for SaaS products, business tools and web applications that need to stay maintainable."
audience: "For teams that need progress without piling up technical debt"
outcomes:
  - "Clarify the architecture of an existing Laravel application."
  - "Ship business features that are testable and maintainable."
  - "Stabilize APIs, scheduled tasks, queues and integrations."
  - "Prepare the product to grow without a full rewrite."
services:
  - title: "Back-end architecture"
    description: "Module boundaries, domain models, business rules and team conventions."
    icon: "i-lucide-network"
  - title: "APIs and integrations"
    description: "REST APIs, webhooks, payments, transactional email and external synchronizations."
    icon: "i-lucide-plug"
  - title: "Performance and reliability"
    description: "Query optimization, queues, scheduler, cache, logs and error handling."
    icon: "i-lucide-gauge"
  - title: "Codebase improvement"
    description: "Progressive rewrites of fragile areas without blocking product delivery."
    icon: "i-lucide-wrench"
process:
  - title: "Diagnosis"
    description: "Understand the product, risks and code areas that actually slow the team down."
  - title: "Short plan"
    description: "Define a shippable scope with priorities, constraints and acceptance criteria."
  - title: "Implementation"
    description: "Develop in small increments, with tests around important behavior."
  - title: "Handover"
    description: "Document decisions and leave code the team can continue to evolve."
proof:
  - title: "Production SaaS"
    description: "Experience with products that include accounts, subscriptions, administration and real users."
  - title: "Pragmatic infrastructure"
    description: "Deployments, backups, Redis, Postgres and monitoring are part of the design."
  - title: "Modern Laravel stack"
    description: "Laravel, Vue, Nuxt, Inertia, Postgres, Docker and reproducible deployment workflows."
faq:
  - label: "Can you work on a Laravel application already in production?"
    content: "Yes. I start by isolating risks, understanding critical flows and proposing progressive changes to avoid unnecessary rewrites."
  - label: "Do you also work on the front end?"
    content: "Yes, mainly with Vue, Nuxt and Inertia. It helps keep APIs, screens and user workflows coherent."
  - label: "Can you help with performance?"
    content: "Yes. I review queries, queues, caches, scheduled tasks and integrations before proposing measurable optimizations."
cta:
  title: "Need Laravel help?"
  description: "Book a short call to clarify your context, risks and the first useful improvement."
  primaryLabel: "Book a call"
  secondaryLabel: "Read articles"

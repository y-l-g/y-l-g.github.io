seo:
  title: "Laravel, Vue and Nuxt SaaS development"
  description: "SaaS design and development with Laravel, Vue, Nuxt, subscriptions, accounts, teams, administration, integrations and deployment."
headline: "SaaS"
title: "Laravel, Vue and Nuxt SaaS development"
description: "I help build pragmatic SaaS products: accounts, subscriptions, administration, business workflows and reproducible deployments."
audience: "For founders and small teams that need a usable product"
outcomes:
  - "Build a product foundation without over-engineering."
  - "Set up accounts, roles, teams, billing and administration."
  - "Connect the product to critical integrations."
  - "Plan deployment, backups and maintenance from the start."
services:
  - title: "Application foundation"
    description: "Authentication, teams, permissions, administration and module structure."
    icon: "i-lucide-blocks"
  - title: "Subscriptions"
    description: "Payment integration, plans, access, webhooks and subscription flows."
    icon: "i-lucide-credit-card"
  - title: "Product features"
    description: "Useful features, workflows, notifications and usable dashboards."
    icon: "i-lucide-chart-no-axes-combined"
  - title: "Deployment"
    description: "Environments, CI/CD, backups, monitoring and disaster recovery."
    icon: "i-lucide-server-cog"
process:
  - title: "Scope"
    description: "Separate the useful MVP from features that can wait."
  - title: "Foundations"
    description: "Install the product, technical and operational basics."
  - title: "Iterations"
    description: "Ship by user flow rather than isolated technical layers."
  - title: "Operations"
    description: "Plan logs, backups, errors and future changes from early versions."
proof:
  - title: "Webvite"
    description: "A production SaaS with subscriptions, customer websites and paying users."
  - title: "Saasterkit"
    description: "A Laravel, Vue and Inertia starter kit designed to speed up SaaS foundations."
  - title: "Infrastructure"
    description: "Hands-on experience with Postgres, Redis, Docker, k3s, backups and GitOps."
faq:
  - label: "Can you build a complete SaaS?"
    content: "Yes, but I recommend scoping a usable first version: accounts, the main flow, billing when needed and minimal administration."
  - label: "Should we start from a starter kit?"
    content: "It depends. A starter kit can speed things up, but it should not import complexity the product does not need."
  - label: "Can you work on a SaaS that is already live?"
    content: "Yes. I can help stabilize, refactor, add features or clarify architecture without interrupting the product."
cta:
  title: "Building or evolving a SaaS?"
  description: "A short call is often enough to identify the first task that reduces the most risk."
  primaryLabel: "Book a call"
  secondaryLabel: "Read articles"

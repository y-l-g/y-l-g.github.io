seo:
  title: "Freelance Laravel code audit"
  description: "Laravel code audit to identify risks, technical debt, performance, application security, architecture and refactoring priorities."
headline: "Laravel audit"
title: "Laravel code audit"
description: "I review an existing Laravel application to turn a vague sense of technical debt into concrete, actionable priorities."
audience: "For teams that feel the codebase is slowing the product down"
outcomes:
  - "Identify technical risks that actually threaten the product."
  - "Prioritize useful refactors instead of rewriting everything."
  - "Clarify architecture, performance and maintainability issues."
  - "Get a short, understandable and actionable plan."
services:
  - title: "Architecture review"
    description: "Code organization, responsibilities, dependencies, models and critical flows."
    icon: "i-lucide-scan-search"
  - title: "Application risks"
    description: "Practical security, validation, authorization, jobs, webhooks and silent errors."
    icon: "i-lucide-shield-check"
  - title: "Performance"
    description: "Queries, N+1 problems, indexes, cache, queues, long-running jobs and bottlenecks."
    icon: "i-lucide-activity"
  - title: "Action plan"
    description: "Prioritized summary with quick wins, structural work and recommended order."
    icon: "i-lucide-list-checks"
process:
  - title: "Read access"
    description: "Gather context, goals and product areas that currently create problems."
  - title: "Targeted analysis"
    description: "Review critical flows, architecture and risks instead of running an abstract checklist."
  - title: "Debrief"
    description: "Explain findings with concrete examples and risk levels."
  - title: "Prioritization"
    description: "Turn the audit into a realistic correction plan for the team."
proof:
  - title: "Product view"
    description: "The audit connects code risks to product goals instead of judging code in isolation."
  - title: "Laravel stack"
    description: "Analysis adapted to Laravel, Eloquent, queues, scheduler, policies, events and migrations."
  - title: "Pragmatism"
    description: "The recommendation may be to refactor, but also to leave a stable area alone."
faq:
  - label: "How long does a Laravel audit take?"
    content: "It depends on the codebase size, but a focused audit can often fit in a few days with a clear debrief."
  - label: "Do you need production access?"
    content: "Not necessarily. Read access to the repository, deployment information and a few metrics or logs is often enough to start."
  - label: "Can you also implement the fixes?"
    content: "Yes, when useful. The audit can lead to a short correction phase or longer technical support."
cta:
  title: "Need clarity on a Laravel application?"
  description: "We can scope a targeted audit around the areas blocking your team today."
  primaryLabel: "Book a call"
  secondaryLabel: "Read articles"

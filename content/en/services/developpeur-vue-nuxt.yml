seo:
  title: "Freelance Vue and Nuxt developer"
  description: "Vue and Nuxt development for SaaS interfaces, fast websites, customer portals, Laravel-connected front ends and existing apps."
headline: "Vue & Nuxt"
title: "Freelance Vue and Nuxt developer"
description: "I build fast, readable Vue and Nuxt interfaces that connect cleanly to your APIs or Laravel back end."
audience: "For products that need a clear, maintainable and fast front end"
outcomes:
  - "Turn business needs into screens that are easy to use."
  - "Structure components and data to limit complexity."
  - "Improve performance, accessibility and SEO rendering with Nuxt."
  - "Connect the front end cleanly to Laravel or existing APIs."
services:
  - title: "Nuxt applications"
    description: "SSR or static pages, content, i18n, SEO, forms and user areas."
    icon: "i-lucide-panels-top-left"
  - title: "Vue interfaces"
    description: "Reusable components, loading states, forms and business workflows."
    icon: "i-lucide-layout-template"
  - title: "Laravel front ends"
    description: "Vue, Inertia or API-first integration with clear responsibility boundaries."
    icon: "i-lucide-git-branch"
  - title: "UX quality"
    description: "Interfaces that are faster to understand, including empty states, errors and responsive behavior."
    icon: "i-lucide-monitor-smartphone"
process:
  - title: "Scoping"
    description: "Identify key journeys, required data and product constraints."
  - title: "Structure"
    description: "Define components, pages, composables and API contracts before stacking screens."
  - title: "Development"
    description: "Ship views with complete states and testable behavior."
  - title: "Optimization"
    description: "Check server rendering, accessibility, internal links, metadata and performance."
proof:
  - title: "Nuxt 4"
    description: "This site uses Nuxt, Nuxt Content, i18n, sitemap and static rendering."
  - title: "Real products"
    description: "Work on SaaS products, customer spaces and internal tools connected to back ends."
  - title: "Full-stack approach"
    description: "The front end is designed with API, data and deployment constraints in mind."
faq:
  - label: "Can you take over an existing Vue front end?"
    content: "Yes. I start by understanding journeys, component structure and the points that make changes slow or risky."
  - label: "Is Nuxt a good fit for a freelance or SaaS site?"
    content: "Yes, especially when server rendering, performance, content and SEO matter as much as the application experience."
  - label: "Do you work with Nuxt UI?"
    content: "Yes. Nuxt UI is useful for shipping accessible, coherent interfaces quickly without rebuilding a full design system."
cta:
  title: "Need a stronger Vue or Nuxt front end?"
  description: "We can scope a short first improvement around one screen, flow, or SEO/performance issue."
  primaryLabel: "Book a call"
  secondaryLabel: "Read articles"

faq:
  title: Frequently Asked Questions
  description: Answers to common questions about my process and services.
  categories:
    - title: Services & Process
      questions:
        - label: What services do you offer?
          content: |
            I build full-stack web applications. This includes back-end architecture, front-end interfaces, SaaS features, integrations, deployment systems and improving existing products.
        - label: What is your process like?
          content: |
            I prefer a pragmatic and iterative process: understand the need, define the scope, ship in small steps, test what matters and keep communication clear during implementation.
        - label: Do you work with startups?
          content: |
            Yes. I enjoy helping small teams move quickly without sacrificing technical quality, maintainability or product clarity.
    - title: Pricing & Timelines
      questions:
        - label: How much does a project typically cost?
          content: |
            Project costs depend on scope, complexity, integrations and timeline. After an initial conversation, I suggest a structure that fits the actual need rather than a generic package.
        - label: What are your payment terms?
          content: |
            Payment terms are defined at the start of the project depending on the engagement format: short mission, fixed-scope development, ongoing support or product reinforcement.
        - label: How long does a typical project take?
          content: |
            It depends heavily on the scope. A targeted improvement can take a few days, while a larger product can take several weeks or months.
        - label: Do you offer retainers or ongoing support?
          content: |
            Yes. I can help with maintenance, product improvements, architecture, code review or new features.
    - title: About Me
      questions:
        - label: What do you enjoy most about your work?
          content: |
            I like turning technical and product constraints into applications that are simple to use, robust and genuinely useful.
        - label: What are your hobbies outside of work?
          content: |
            I am interested in open-source projects, developer tooling, lightweight infrastructure and well-built digital products.

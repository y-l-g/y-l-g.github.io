about:
  title: "About Me"
  description: |
    Since embarking on my self-taught development journey in 2024, I've focused on building practical products: SaaS applications, business tools, front-end interfaces, automations and deployments. I mostly work with Laravel, Vue, Nuxt, Symfony, Docker and lightweight infrastructure. I like understanding real needs, making hard-to-change code easier to evolve and shipping useful work without unnecessary complexity.
  items:
    - title: "Product context"
      description: "I start with the business need, users and constraints before deciding what the technical shape should be."
      icon: "i-lucide-scan-search"
    - title: "Full-stack web development"
      description: "Back end, front end, data, integrations and existing codebases with a stack chosen for maintainability."
      icon: "i-lucide-blocks"
    - title: "Pragmatic production"
      description: "Deployment, errors, performance, backups and small decisions that make an application more reliable."
      icon: "i-lucide-server-cog"

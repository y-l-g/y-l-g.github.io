seo:
  title: "Développeur Vue et Nuxt freelance"
  description: "Développement Vue et Nuxt pour interfaces SaaS, sites rapides, espaces clients, front-ends connectés à Laravel et reprise d’applications existantes."
headline: "Vue & Nuxt"
title: "Développeur Vue et Nuxt freelance"
description: "Je construis des interfaces Vue et Nuxt pour des produits qui doivent être rapides à utiliser, simples à maintenir et bien connectés au back-end."
audience: "Pour les produits qui ont besoin d’un front-end clair, pas d’une couche de complexité en plus"
outcomes:
  - "Transformer des besoins métier en écrans compréhensibles."
  - "Organiser les composants, les données et les appels API sans multiplier les cas particuliers."
  - "Améliorer le rendu Nuxt, les métadonnées, les liens internes et les performances."
  - "Relier proprement Vue ou Nuxt à Laravel, Inertia ou des API existantes."
services:
  - title: "Applications Nuxt"
    description: "Pages statiques ou SSR, contenu, i18n, SEO, formulaires, espaces utilisateurs et routes propres."
    icon: "i-lucide-panels-top-left"
  - title: "Interfaces Vue"
    description: "Composants, formulaires, états de chargement, erreurs, filtres, tableaux et parcours métier."
    icon: "i-lucide-layout-template"
  - title: "Front-end Laravel"
    description: "Vue avec Inertia ou API-first, en gardant une séparation nette entre interface et logique métier."
    icon: "i-lucide-git-branch"
  - title: "Expérience utilisateur"
    description: "Des écrans plus faciles à lire, y compris dans les états vides, les erreurs et les versions mobiles."
    icon: "i-lucide-monitor-smartphone"
process:
  - title: "Parcours"
    description: "Identifier ce que l’utilisateur doit réussir à faire, avec quelles données et quelles contraintes."
  - title: "Structure"
    description: "Poser les pages, composants, composables et contrats API avant d’ajouter trop d’écrans."
  - title: "Développement"
    description: "Livrer des vues complètes, avec les états importants traités dès le départ."
  - title: "Vérification"
    description: "Contrôler le rendu, l’accessibilité, les métadonnées, les liens internes et la performance."
proof:
  - title: "Nuxt 4"
    description: "Ce site utilise Nuxt, Nuxt Content, i18n, sitemap et génération statique."
  - title: "Produits réels"
    description: "Travail sur des SaaS, espaces clients et outils internes branchés sur des back-ends existants."
  - title: "Vision full-stack"
    description: "Le front est pensé avec les contraintes d’API, de données, de déploiement et de maintenance."
faq:
  - label: "Pouvez-vous reprendre un front-end Vue existant ?"
    content: "Oui. Je regarde d’abord les parcours, la structure des composants et ce qui rend les évolutions lentes ou risquées."
  - label: "Nuxt est-il adapté à un site freelance ou SaaS ?"
    content: "Oui, surtout quand le SEO, le contenu, le rendu serveur et l’expérience applicative comptent en même temps."
  - label: "Travaillez-vous avec Nuxt UI ?"
    content: "Oui. Nuxt UI permet de livrer vite des interfaces cohérentes sans repartir de zéro sur chaque composant."
cta:
  title: "Besoin d’un front-end Vue ou Nuxt plus solide ?"
  description: "On peut cadrer un premier chantier autour d’un écran, d’un parcours ou d’une amélioration SEO/performance."
  primaryLabel: "Réserver un appel"
  secondaryLabel: "Lire les articles"

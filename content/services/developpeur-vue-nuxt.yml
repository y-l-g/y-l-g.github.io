seo:
  title: "Développeur Vue et Nuxt freelance"
  description: "Développement Vue et Nuxt pour interfaces SaaS, sites rapides, espaces clients, front-ends connectés à Laravel et amélioration d’applications existantes."
headline: "Vue & Nuxt"
title: "Développeur Vue et Nuxt freelance"
description: "Je construis des interfaces Vue et Nuxt rapides, lisibles et connectées proprement à vos API ou à votre back-end Laravel."
audience: "Pour les produits qui ont besoin d’un front-end clair, maintenable et rapide"
outcomes:
  - "Transformer des besoins métier en écrans simples à utiliser."
  - "Structurer les composants et les données pour limiter la complexité."
  - "Améliorer performance, accessibilité et rendu SEO sur Nuxt."
  - "Connecter proprement le front-end à Laravel ou à des API existantes."
services:
  - title: "Applications Nuxt"
    description: "Pages SSR ou statiques, contenus, i18n, SEO, formulaires et espaces utilisateurs."
    icon: "i-lucide-panels-top-left"
  - title: "Interfaces Vue"
    description: "Composants réutilisables, états de chargement, formulaires et workflows métier."
    icon: "i-lucide-layout-template"
  - title: "Front-end Laravel"
    description: "Intégration Vue, Inertia ou API-first avec une séparation claire des responsabilités."
    icon: "i-lucide-git-branch"
  - title: "Qualité UX"
    description: "Interfaces plus rapides à comprendre, avec attention portée aux états vides, erreurs et responsive."
    icon: "i-lucide-monitor-smartphone"
process:
  - title: "Cadrage"
    description: "Identifier les parcours clés, les données nécessaires et les contraintes du produit."
  - title: "Structure"
    description: "Définir les composants, pages, composables et contrats API avant d’empiler les écrans."
  - title: "Développement"
    description: "Livrer les vues avec des états complets et des comportements testables."
  - title: "Optimisation"
    description: "Vérifier rendu serveur, accessibilité, liens internes, métadonnées et performance."
proof:
  - title: "Nuxt 4"
    description: "Ce site utilise Nuxt, Nuxt Content, i18n, sitemap et rendu statique."
  - title: "Produits réels"
    description: "Travail sur des SaaS, espaces clients et outils internes connectés à des back-ends."
  - title: "Approche full-stack"
    description: "Le front est conçu avec les contraintes API, données et déploiement en tête."
faq:
  - label: "Pouvez-vous reprendre un front-end Vue existant ?"
    content: "Oui. Je commence par comprendre les parcours, la structure des composants et les points qui rendent les évolutions lentes ou risquées."
  - label: "Nuxt est-il adapté à un site freelance ou SaaS ?"
    content: "Oui, surtout quand le rendu serveur, les performances, le contenu et le SEO comptent autant que l’expérience applicative."
  - label: "Travaillez-vous avec Nuxt UI ?"
    content: "Oui. Nuxt UI est utile pour livrer vite des interfaces accessibles et cohérentes sans recréer tout un design system."
cta:
  title: "Besoin d’un front-end Vue ou Nuxt plus solide ?"
  description: "On peut cadrer un premier chantier court autour d’un écran, d’un flux ou d’une amélioration SEO/performance."
  primaryLabel: "Réserver un appel"
  secondaryLabel: "Lire les articles"

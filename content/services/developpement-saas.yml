seo:
  title: "Développement SaaS Laravel, Vue et Nuxt"
  description: "Conception et développement SaaS avec Laravel, Vue, Nuxt, abonnements, comptes, équipes, administration, intégrations et déploiement."
headline: "SaaS"
title: "Développement SaaS Laravel, Vue et Nuxt"
description: "J’aide à construire ou faire évoluer des SaaS avec Laravel, Vue et Nuxt : comptes, abonnements, administration, intégrations, emails, déploiement et maintenance."
audience: "Pour les fondateurs et petites équipes qui veulent un produit utilisable, pas seulement une démo"
outcomes:
  - "Construire un socle produit clair sans tout sur-ingénier."
  - "Mettre en place comptes, rôles, équipes, facturation et administration."
  - "Relier le produit aux services externes dont il dépend vraiment."
  - "Prévoir le déploiement, les sauvegardes, les logs et la maintenance dès le départ."
services:
  - title: "Socle applicatif"
    description: "Authentification, organisations, permissions, administration, emails et structure des modules."
    icon: "i-lucide-blocks"
  - title: "Abonnements"
    description: "Paiement, plans, accès, webhooks, emails de cycle de vie et parcours de souscription."
    icon: "i-lucide-credit-card"
  - title: "Produit métier"
    description: "Fonctionnalités utiles, tableaux de bord, notifications, exports et parcours qui collent au vrai usage."
    icon: "i-lucide-chart-no-axes-combined"
  - title: "Déploiement"
    description: "Environnements, CI/CD, sauvegardes, supervision, files d’attente et reprise après incident."
    icon: "i-lucide-server-cog"
process:
  - title: "Périmètre"
    description: "Séparer ce qui doit être livré maintenant de ce qui peut attendre une vraie preuve d’usage."
  - title: "Fondations"
    description: "Installer les bases produit, techniques et opérationnelles sans enfermer le projet trop tôt."
  - title: "Itérations"
    description: "Livrer par parcours utilisateur complets plutôt que par couches techniques isolées."
  - title: "Exploitation"
    description: "Prévoir les logs, sauvegardes, erreurs et évolutions avant que le produit devienne difficile à maintenir."
proof:
  - title: "Webvite"
    description: "Un SaaS en production avec abonnements, sites clients et utilisateurs payants."
  - title: "Saasterkit"
    description: "Un starter kit Laravel, Vue et Inertia créé pour éviter de réécrire les mêmes bases SaaS."
  - title: "Infrastructure"
    description: "Expérience concrète avec Postgres, Redis, Docker, k3s, sauvegardes et GitOps."
faq:
  - label: "Pouvez-vous créer un SaaS complet ?"
    content: "Oui, mais je préfère commencer par un périmètre exploitable : les comptes, le flux principal, la facturation si elle est nécessaire et une administration suffisante."
  - label: "Faut-il partir d’un starter kit ?"
    content: "Cela dépend du contexte. Un starter kit peut faire gagner du temps, mais il ne doit pas imposer une complexité inutile au produit."
  - label: "Pouvez-vous intervenir sur un SaaS déjà lancé ?"
    content: "Oui. Je peux aider à stabiliser, refactorer, ajouter des fonctionnalités ou clarifier une partie du code sans interrompre le produit."
cta:
  title: "Vous construisez ou faites évoluer un SaaS ?"
  description: "Un échange court suffit souvent à repérer le chantier qui réduit le plus de risque."
  primaryLabel: "Réserver un appel"
  secondaryLabel: "Lire les articles"

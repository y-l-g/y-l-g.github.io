seo:
  title: "Audit de code Laravel freelance"
  description: "Audit de code Laravel pour identifier risques, dette technique, performance, sécurité applicative, architecture et priorités de refonte."
headline: "Audit Laravel"
title: "Audit de code Laravel"
description: "J’analyse une application Laravel existante pour transformer une impression de dette technique en priorités concrètes et actionnables."
audience: "Pour les équipes qui sentent que le code ralentit le produit"
outcomes:
  - "Identifier les risques techniques qui menacent vraiment le produit."
  - "Prioriser les refontes utiles au lieu de tout réécrire."
  - "Clarifier les problèmes d’architecture, performance et maintenabilité."
  - "Obtenir un plan d’action court, compréhensible et exploitable."
services:
  - title: "Lecture d’architecture"
    description: "Organisation du code, responsabilités, dépendances, modèles et flux critiques."
    icon: "i-lucide-scan-search"
  - title: "Risques applicatifs"
    description: "Sécurité pratique, validations, autorisations, jobs, webhooks et erreurs silencieuses."
    icon: "i-lucide-shield-check"
  - title: "Performance"
    description: "Requêtes, N+1, index, cache, queues, traitements longs et points de contention."
    icon: "i-lucide-activity"
  - title: "Plan d’action"
    description: "Synthèse priorisée avec quick wins, chantiers structurants et ordre recommandé."
    icon: "i-lucide-list-checks"
process:
  - title: "Accès lecture"
    description: "Récupérer le contexte, les objectifs et les zones du produit qui posent problème."
  - title: "Analyse ciblée"
    description: "Lire les flux critiques, l’architecture et les risques au lieu de faire une checklist abstraite."
  - title: "Restitution"
    description: "Expliquer les constats avec exemples concrets et niveau de risque."
  - title: "Priorisation"
    description: "Transformer l’audit en plan de correction réaliste pour l’équipe."
proof:
  - title: "Vision produit"
    description: "L’audit ne juge pas seulement le code, il relie les risques aux objectifs du produit."
  - title: "Stack Laravel"
    description: "Analyse adaptée à Laravel, Eloquent, queues, scheduler, policies, events et migrations."
  - title: "Pragmatisme"
    description: "La recommandation peut être de refactorer, mais aussi de ne pas toucher une zone stable."
faq:
  - label: "Combien de temps dure un audit Laravel ?"
    content: "Cela dépend de la taille du code, mais un audit ciblé peut souvent tenir sur quelques jours avec une restitution claire."
  - label: "Faut-il donner accès à la production ?"
    content: "Pas nécessairement. Un accès lecture au dépôt, aux informations de déploiement et à quelques métriques/logs suffit souvent pour commencer."
  - label: "Livrez-vous aussi les corrections ?"
    content: "Oui, si c’est utile. L’audit peut déboucher sur un chantier court de corrections prioritaires ou sur un accompagnement plus long."
cta:
  title: "Besoin d’y voir clair dans une application Laravel ?"
  description: "On peut cadrer un audit ciblé autour des zones qui bloquent votre équipe aujourd’hui."
  primaryLabel: "Réserver un appel"
  secondaryLabel: "Lire les articles"

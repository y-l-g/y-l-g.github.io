seo:
  title: "Développeur Laravel freelance en France"
  description: "Développement Laravel freelance pour SaaS, API, back-end métier, refonte de modules, performance et fiabilisation d’applications existantes."
headline: "Laravel"
title: "Développeur Laravel freelance"
description: "Je conçois et améliore des back-ends Laravel robustes pour des SaaS, outils métier et produits web qui doivent rester simples à maintenir."
audience: "Pour les équipes qui veulent avancer sans empiler de dette technique"
outcomes:
  - "Clarifier l’architecture d’une application Laravel existante."
  - "Livrer des fonctionnalités métier testables et maintenables."
  - "Fiabiliser les API, tâches planifiées, files d’attente et intégrations."
  - "Préparer le produit à grandir sans tout réécrire."
services:
  - title: "Architecture back-end"
    description: "Découpage des modules, modèles de domaine, règles métier et conventions d’équipe."
    icon: "i-lucide-network"
  - title: "API et intégrations"
    description: "API REST, webhooks, paiements, emails transactionnels et synchronisations externes."
    icon: "i-lucide-plug"
  - title: "Performance et fiabilité"
    description: "Optimisation des requêtes, queues, scheduler, cache, logs et gestion des erreurs."
    icon: "i-lucide-gauge"
  - title: "Reprise de code"
    description: "Refonte progressive de zones fragiles sans bloquer la livraison produit."
    icon: "i-lucide-wrench"
process:
  - title: "Diagnostic"
    description: "Comprendre le produit, les risques et les zones du code qui ralentissent vraiment l’équipe."
  - title: "Plan court"
    description: "Définir un périmètre livrable avec priorités, contraintes et critères d’acceptation."
  - title: "Implémentation"
    description: "Développer par petits incréments, avec tests sur les comportements importants."
  - title: "Transmission"
    description: "Documenter les décisions et laisser un code que l’équipe peut continuer à faire évoluer."
proof:
  - title: "SaaS en production"
    description: "Expérience sur des produits avec comptes, abonnements, administration et vrais utilisateurs."
  - title: "Infrastructure pragmatique"
    description: "Déploiements, sauvegardes, Redis, Postgres et supervision font partie de la réflexion."
  - title: "Stack Laravel moderne"
    description: "Laravel, Vue, Nuxt, Inertia, Postgres, Docker et workflows de déploiement reproductibles."
faq:
  - label: "Pouvez-vous intervenir sur une application Laravel déjà en production ?"
    content: "Oui. Je commence par isoler les risques, comprendre les flux critiques et proposer des changements progressifs pour éviter une réécriture inutile."
  - label: "Travaillez-vous aussi sur le front-end ?"
    content: "Oui, surtout avec Vue, Nuxt et Inertia. C’est utile pour garder une cohérence entre l’API, les écrans et les workflows utilisateur."
  - label: "Pouvez-vous aider sur la performance ?"
    content: "Oui. J’analyse les requêtes, files d’attente, caches, traitements planifiés et points d’intégration avant de proposer des optimisations mesurables."
cta:
  title: "Besoin d’un renfort Laravel ?"
  description: "Réservez un court échange pour clarifier votre contexte, vos risques et le premier chantier utile."
  primaryLabel: "Réserver un appel"
  secondaryLabel: "Lire les articles"

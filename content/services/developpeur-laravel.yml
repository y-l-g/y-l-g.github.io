seo:
  title: "Développeur Laravel freelance en France"
  description: "Développement Laravel freelance pour SaaS, API, back-end métier, refonte de modules, performance et maintenance d’applications existantes."
headline: "Laravel"
title: "Développeur Laravel freelance"
description: "Je développe et reprends des applications Laravel : API, back-end métier, webhooks, jobs, facturation, performance et code existant qui a besoin d’être remis au clair."
audience: "Pour les équipes qui veulent livrer sans laisser le code devenir un frein"
outcomes:
  - "Comprendre ce qui bloque vraiment dans une application Laravel existante."
  - "Livrer des fonctionnalités métier lisibles, testables et faciles à reprendre."
  - "Rendre plus fiables les API, jobs, webhooks, tâches planifiées et intégrations."
  - "Faire évoluer le produit par étapes, sans partir trop vite sur une réécriture."
services:
  - title: "Back-end Laravel"
    description: "Modèles, services, contrôleurs, policies, jobs, événements et règles métier là où elles ont vraiment leur place."
    icon: "i-lucide-network"
  - title: "API et intégrations"
    description: "API REST, webhooks, paiements, emails, synchronisations et échanges avec des outils externes."
    icon: "i-lucide-plug"
  - title: "Performance"
    description: "Requêtes lentes, N+1, cache, queues, scheduler, logs et erreurs qui passent trop facilement sous le radar."
    icon: "i-lucide-gauge"
  - title: "Reprise de code"
    description: "Remise en ordre progressive de zones fragiles, sans bloquer les évolutions dont le produit a besoin."
    icon: "i-lucide-wrench"
process:
  - title: "Comprendre"
    description: "Lire le produit, les flux importants et les endroits du code où l’équipe perd du temps."
  - title: "Cadrer"
    description: "Choisir un périmètre court, avec des priorités claires et des critères de validation simples."
  - title: "Développer"
    description: "Avancer par petits changements, avec des tests sur les comportements qui comptent vraiment."
  - title: "Transmettre"
    description: "Laisser du code lisible, quelques notes utiles et des décisions techniques faciles à retrouver."
proof:
  - title: "SaaS en production"
    description: "Expérience sur des produits avec comptes, abonnements, administration et utilisateurs réels."
  - title: "Exploitation"
    description: "Déploiement, sauvegardes, Redis, Postgres, logs et incidents font partie du sujet, pas seulement le code."
  - title: "Stack Laravel moderne"
    description: "Laravel, Vue, Nuxt, Inertia, Postgres, Docker et déploiements reproductibles."
faq:
  - label: "Pouvez-vous intervenir sur une application Laravel déjà en production ?"
    content: "Oui. Je commence par comprendre les flux critiques et les risques, puis je propose des changements progressifs pour éviter de casser ce qui fonctionne déjà."
  - label: "Travaillez-vous aussi sur le front-end ?"
    content: "Oui, surtout avec Vue, Nuxt et Inertia. C’est souvent plus efficace quand les écrans, l’API et les règles métier sont pensés ensemble."
  - label: "Pouvez-vous aider sur la performance ?"
    content: "Oui. Je regarde d’abord les requêtes, files d’attente, caches, traitements planifiés et intégrations avant de proposer des optimisations."
cta:
  title: "Besoin d’un renfort Laravel ?"
  description: "On peut commencer par un échange court pour comprendre le contexte et choisir le premier chantier utile."
  primaryLabel: "Réserver un appel"
  secondaryLabel: "Lire les articles"

description: "Je construis des applications Laravel, Vue et Nuxt robustes, de l’architecture back-end aux interfaces soignées, avec des workflows de déploiement pragmatiques. Basé en Bretagne, France."
hero:
about:
  title: "À propos"
  description: |
    Depuis le début de mon parcours autodidacte dans le développement en 2024, je me concentre surtout sur Laravel et Vue. J’ai aussi une expérience concrète avec Symfony et Docker, ainsi que des explorations autour de Django. J’aime expérimenter de nouvelles technologies, contribuer à des projets open source et concevoir des applications élégantes qui apportent une valeur tangible.

seo:
  title: "Développeur freelance Laravel & Vue en France"
  description: "Youenn Le Gouedec développe des applications Laravel, Vue et Nuxt pour des SaaS, outils métier et petites équipes qui veulent avancer proprement."
title: "Youenn Le Gouedec, développeur Laravel & Vue"
description: "Je travaille sur des applications Laravel, Vue et Nuxt : back-end, interfaces, intégrations, déploiement et reprise de code existant. Basé en Bretagne, j’aime les projets où il faut comprendre le métier et construire quelque chose de simple à faire évoluer."
hero:
about:
  title: "À propos"
  description: |
    Je me suis formé en construisant des projets concrets, surtout autour de Laravel et Vue. Je travaille aussi avec Nuxt, Symfony, Docker et un peu d’infrastructure légère. Ce que j’aime : comprendre un besoin réel, remettre de l’ordre quand le code devient difficile à faire évoluer, et livrer des choses utiles sans ajouter de complexité inutile.
services:
  title: "Ce que je peux prendre en charge"
  description: "J’interviens sur des applications web existantes ou en construction, avec une préférence pour les produits Laravel, Vue, Nuxt et les petits SaaS."
  items:
    - title: "Développement Laravel"
      description: "API, modèles trop chargés, jobs fragiles, webhooks, facturation, refonte progressive de modules et amélioration de bases existantes."
      icon: "i-lucide-database"
      to: "/developpeur-laravel"
    - title: "Développement Vue & Nuxt"
      description: "Pages, formulaires, états d’erreur, intégration API, rendu serveur et interfaces qui restent lisibles quand le produit grandit."
      icon: "i-lucide-layout-dashboard"
      to: "/developpeur-vue-nuxt"
    - title: "Développement SaaS"
      description: "Comptes, abonnements, équipes, administration, emails, droits d’accès, intégrations et déploiement."
      icon: "i-lucide-rocket"
      to: "/developpement-saas"
    - title: "Audit de code Laravel"
      description: "Lecture d’un code existant pour repérer les zones risquées, les lenteurs, les raccourcis dangereux et les corrections à prioriser."
      icon: "i-lucide-search-check"
      to: "/audit-code-laravel"

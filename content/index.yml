seo:
  title: "Développeur web full-stack freelance en France"
  description: "Youenn Le Gouedec développe des applications web full-stack pour SaaS, outils métier et petites équipes qui veulent avancer proprement."
title: "Youenn Le Gouedec, développeur web full-stack"
description: "Je construis et fais évoluer des applications web : back-end, interfaces, intégrations, déploiement et reprise de code existant. Basé en Bretagne, j’aime les projets où il faut comprendre le métier et construire quelque chose de simple à faire évoluer."
hero:
about:
  title: "À propos"
  description: |
    Je me suis formé en construisant des projets concrets : produits SaaS, outils web, interfaces métier, automatisations et déploiements. Je travaille surtout avec Laravel, Vue, Nuxt, Symfony, Docker et un peu d’infrastructure légère. Ce que j’aime : comprendre un besoin réel, remettre de l’ordre quand le code devient difficile à faire évoluer, et livrer des choses utiles sans ajouter de complexité inutile.
  items:
    - title: "Produit & métier"
      description: "Je cherche d’abord à comprendre le besoin, les utilisateurs et les contraintes avant de choisir la solution technique."
      icon: "i-lucide-scan-search"
    - title: "Développement web full-stack"
      description: "Back-end, front-end, données, intégrations et reprise de code existant avec une stack choisie pour rester maintenable."
      icon: "i-lucide-blocks"
    - title: "Production sobre"
      description: "Déploiement, erreurs, performance, sauvegardes et petites décisions qui rendent une application plus fiable."
      icon: "i-lucide-server-cog"

blog:
  title: "Notes Laravel, Nuxt et infrastructure"
faq:
  title: Questions fréquentes
  description: Quelques réponses simples sur ma façon de travailler.
  categories:
    - title: Services et méthode
      questions:
        - label: Quels services proposez-vous ?
          content: |
            Je développe des applications web avec Laravel, Vue et Nuxt. Je peux intervenir sur un nouveau projet, ajouter des fonctionnalités, reprendre une zone fragile du code ou aider à remettre une base existante en ordre.
        - label: Comment se déroule votre méthode de travail ?
          content: |
            Je commence par comprendre le besoin et les contraintes. Ensuite je propose un périmètre court, je livre par étapes, et je garde les décisions techniques visibles pour éviter les surprises.
        - label: Travaillez-vous avec des startups ?
          content: |
            Oui. Je préfère même les petites équipes où il faut être direct, choisir les bons compromis et livrer sans faire semblant que tout mérite une grosse architecture.
    - title: Budget et délais
      questions:
        - label: Combien coûte généralement un projet ?
          content: |
            Cela dépend du périmètre. Une correction ciblée peut être courte, alors qu’un produit complet demande un vrai cadrage. Je préfère estimer après avoir compris le contexte plutôt que donner un prix générique.
        - label: Quelles sont vos modalités de paiement ?
          content: |
            On les définit au début selon le format : mission courte, forfait cadré, accompagnement régulier ou renfort sur une période donnée.
        - label: Combien de temps dure un projet typique ?
          content: |
            Une amélioration précise peut prendre quelques jours. Un module complet ou un produit plus large se compte plutôt en semaines.
        - label: Proposez-vous de l’accompagnement continu ?
          content: |
            Oui. Je peux aider sur la maintenance, les évolutions produit, la revue de code ou les sujets d’architecture quand l’équipe a besoin d’un regard extérieur.
    - title: À propos
      questions:
        - label: Qu’aimez-vous le plus dans votre travail ?
          content: |
            J’aime quand un problème flou devient une application plus simple à comprendre, côté utilisateur comme côté code.
        - label: Quels sont vos centres d’intérêt en dehors du travail ?
          content: |
            Je m’intéresse à l’open source, aux outils de développement, à l’infrastructure légère et aux petits produits numériques bien construits.

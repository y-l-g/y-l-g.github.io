blog:
  title: "Notes Laravel, Nuxt et infrastructure"
faq:
  title: Questions fréquentes
  description: Réponses aux questions courantes sur ma façon de travailler et mes services.
  categories:
    - title: Services et méthode
      questions:
        - label: Quels services proposez-vous ?
          content: |
            Je travaille sur la conception et le développement d’applications web avec Laravel, Vue et Nuxt. Cela inclut l’architecture back-end, les interfaces front-end, les intégrations SaaS, les systèmes de déploiement et l’amélioration de produits existants.
        - label: Comment se déroule votre méthode de travail ?
          content: |
            Je privilégie une approche pragmatique et itérative : comprendre le besoin, cadrer le périmètre, livrer par petites étapes, tester ce qui compte et garder une communication claire pendant l’implémentation.
        - label: Travaillez-vous avec des startups ?
          content: |
            Oui. J’aime accompagner des petites équipes qui ont besoin d’avancer vite sans sacrifier la qualité technique, la maintenabilité ou la clarté du produit.
    - title: Budget et délais
      questions:
        - label: Combien coûte généralement un projet ?
          content: |
            Le budget dépend du périmètre, de la complexité, des intégrations et du calendrier. Après un premier échange, je propose un cadrage adapté au besoin réel plutôt qu’un forfait générique.
        - label: Quelles sont vos modalités de paiement ?
          content: |
            Les modalités sont définies au démarrage du projet selon le format choisi : mission courte, développement au forfait, accompagnement continu ou renfort produit.
        - label: Combien de temps dure un projet typique ?
          content: |
            Cela dépend fortement du périmètre. Une amélioration ciblée peut prendre quelques jours, tandis qu’un produit plus complet demande plusieurs semaines ou plusieurs mois.
        - label: Proposez-vous de l’accompagnement continu ?
          content: |
            Oui. Je peux intervenir en maintenance, évolution produit, architecture, revue de code ou développement de nouvelles fonctionnalités.
    - title: À propos
      questions:
        - label: Qu’aimez-vous le plus dans votre travail ?
          content: |
            J’aime transformer des contraintes techniques et produit en applications simples à utiliser, robustes et réellement utiles.
        - label: Quels sont vos centres d’intérêt en dehors du travail ?
          content: |
            Je m’intéresse aux projets open source, aux outils de développement, à l’infrastructure légère et aux produits numériques bien construits.
